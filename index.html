<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keystone - Post-Quantum Cryptography Benchmarking Platform</title>
<style>
  :root {
    color-scheme: light;
    --bg: #F6F4F0;
    --surface: #FFFCF7;
    --surface-2: #ECE8E0;
    --ink: #111820;
    --ink-soft: #3F4A55;
    --ink-muted: #6D7680;
    --border: #D7D1C7;
    --border-strong: #AEB7C0;
    --dark: #0B1117;
    --dark-2: #101820;
    --dark-3: #17212B;
    --dark-ink: #F4F7FA;
    --dark-muted: #AEB9C4;
    --accent: #2E5E91;
    --accent-2: #6FA0D0;
    --success: #00A36C;
    --warning: #D28A15;
    --shadow: 0 28px 80px rgba(11, 17, 23, 0.18);
    --max: 1360px;
    --gutter: clamp(18px, 4vw, 56px);
  }

  * { box-sizing: border-box; }
  html {
    margin: 0;
    padding: 0;
    scroll-behavior: smooth;
    overflow-x: hidden;
  }
  body {
    margin: 0;
    min-width: 0;
    overflow-x: hidden;
    background:
      linear-gradient(90deg, rgba(46, 94, 145, 0.045) 1px, transparent 1px),
      linear-gradient(180deg, rgba(46, 94, 145, 0.04) 1px, transparent 1px),
      var(--bg);
    background-size: 96px 96px;
    color: var(--ink);
    font-family: Sohne, Aptos, "Segoe UI", system-ui, -apple-system, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(circle at 15% 8%, rgba(255, 252, 247, 0.9), transparent 30%),
      radial-gradient(circle at 82% 18%, rgba(46, 94, 145, 0.1), transparent 28%);
  }
  a { color: inherit; }
  button, input { font: inherit; }
  img { display: block; max-width: 100%; }
  ::selection { background: var(--accent); color: var(--surface); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .mono {
    font-family: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
  }
  .page-shell { min-width: 0; }
  .container {
    width: min(100%, var(--max));
    margin: 0 auto;
    padding-inline: var(--gutter);
  }
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(11, 17, 23, 0.97);
    color: var(--dark-ink);
    border-bottom: 1px solid rgba(244, 247, 250, 0.1);
  }
  .nav-inner {
    min-height: 64px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: clamp(18px, 3vw, 42px);
    align-items: center;
  }
  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    color: inherit;
    text-decoration: none;
  }
  .brand-mark {
    width: var(--mark-size, 34px);
    height: var(--mark-size, 34px);
    display: inline-grid;
    place-items: center;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .wordmark-text {
    font-size: 21px;
    font-weight: 650;
    letter-spacing: -0.03em;
  }
  .nav-links {
    display: flex;
    justify-content: center;
    gap: clamp(18px, 3vw, 42px);
    font-size: 13px;
  }
  .nav-links a,
  .footer a {
    color: inherit;
    text-decoration: none;
  }
  .nav-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    gap: 10px;
    padding: 0 22px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: transparent;
    color: var(--ink);
    font-size: 14px;
    font-weight: 650;
    text-decoration: none;
    cursor: pointer;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    white-space: nowrap;
  }
  .btn:hover { transform: translateY(-1px); border-color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #FFFFFF;
  }
  .site-nav .btn { color: var(--dark-ink); border-color: rgba(244, 247, 250, 0.22); }
  .site-nav .btn.primary { background: var(--accent); border-color: var(--accent); }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .eyebrow::after {
    content: "";
    width: 44px;
    height: 2px;
    background: currentColor;
  }
  .hero {
    position: relative;
    padding: clamp(56px, 8vw, 92px) 0 clamp(34px, 5vw, 58px);
    overflow: hidden;
  }
  .hero::after,
  .blueprint::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.32;
    background:
      linear-gradient(135deg, transparent 0 48%, rgba(46, 94, 145, 0.18) 49% 50%, transparent 51%),
      linear-gradient(45deg, transparent 0 48%, rgba(46, 94, 145, 0.12) 49% 50%, transparent 51%);
    background-size: 180px 180px;
    mask-image: radial-gradient(circle at 78% 38%, black, transparent 42%);
  }
  .hero-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(440px, 1fr);
    gap: clamp(42px, 6vw, 82px);
    align-items: center;
  }
  .hero .container {
    width: min(100%, 1500px);
  }
  .hero-copy {
    display: grid;
    gap: 24px;
    min-width: 0;
  }
  .hero h1 {
    margin: 0;
    max-width: 780px;
    font-size: clamp(48px, 7vw, 88px);
    line-height: 0.97;
    letter-spacing: -0.055em;
    font-weight: 760;
  }
  .accent-word { color: var(--accent); }
  .lede {
    max-width: 560px;
    margin: 0;
    color: var(--ink-soft);
    font-size: clamp(17px, 1.6vw, 20px);
    line-height: 1.55;
  }
  .hero-actions,
  .button-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .trusted {
    display: grid;
    gap: 16px;
    margin-top: 8px;
  }
  .trusted-label,
  .caption {
    color: var(--ink-muted);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .trusted-list {
    display: flex;
    flex-wrap: wrap;
    gap: 18px 32px;
    color: rgba(17, 24, 32, 0.58);
    font-size: clamp(18px, 2.2vw, 25px);
    font-weight: 760;
    letter-spacing: -0.04em;
  }
  .product-card {
    min-width: 0;
    overflow: hidden;
    border: 1px solid rgba(244, 247, 250, 0.12);
    border-radius: 8px;
    background: var(--dark);
    color: var(--dark-ink);
    box-shadow: var(--shadow);
  }
  .product-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 18px 20px;
    border-bottom: 1px solid rgba(244, 247, 250, 0.1);
  }
  .product-body {
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr);
    min-width: 0;
  }
  .product-side {
    padding: 16px 14px;
    border-right: 1px solid rgba(244, 247, 250, 0.1);
    background: rgba(255, 255, 255, 0.02);
  }
  .product-side div {
    padding: 9px 10px;
    border-radius: 4px;
    color: var(--dark-muted);
    font-size: 12px;
  }
  .product-side div:first-child {
    background: rgba(46, 94, 145, 0.28);
    color: var(--dark-ink);
  }
  .dashboard {
    min-width: 0;
    padding: clamp(18px, 2.8vw, 28px);
    display: grid;
    gap: 18px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }
  .stat-card,
  .dark-card {
    min-width: 0;
    border: 1px solid rgba(244, 247, 250, 0.1);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.025);
    padding: 16px;
  }
  .stat-card strong {
    display: block;
    margin-top: 8px;
    font-size: clamp(22px, 2.2vw, 30px);
    line-height: 1;
  }
  .stat-card span,
  .dark-card span {
    color: var(--dark-muted);
    font-size: 11px;
  }
  .chart {
    min-height: 190px;
    position: relative;
    overflow: hidden;
  }
  .chart svg {
    width: 100%;
    height: 100%;
    min-height: 190px;
  }
  .section {
    position: relative;
    padding: clamp(64px, 8vw, 112px) 0;
    border-top: 1px solid rgba(17, 24, 32, 0.09);
  }
  .section.dark {
    background: var(--dark);
    color: var(--dark-ink);
    border-top-color: rgba(244, 247, 250, 0.12);
  }
  .section.blueprint {
    overflow: hidden;
    background:
      linear-gradient(90deg, rgba(9, 31, 52, 0.2), rgba(9, 31, 52, 0)),
      linear-gradient(100deg, #123D66 0%, #205D91 52%, #2B6EA6 100%);
    color: #FFFFFF;
  }
  .section-head {
    display: grid;
    gap: 12px;
    margin-bottom: clamp(30px, 5vw, 56px);
    text-align: center;
    justify-items: center;
  }
  .section-head.left {
    text-align: left;
    justify-items: start;
  }
  .section-head h2,
  .cta h2 {
    margin: 0;
    max-width: 780px;
    font-size: clamp(34px, 4vw, 52px);
    line-height: 1.02;
    letter-spacing: -0.04em;
  }
  .section-head p,
  .card p,
  .process-copy p,
  .cta p,
  .footer p {
    margin: 0;
    color: var(--ink-soft);
  }
  .dark .section-head p,
  .dark .card p,
  .dark .caption,
  .blueprint p {
    color: #EAF3FC;
  }
  .blueprint .eyebrow {
    color: #D8ECFF;
  }
  .cta .btn.primary {
    background: #FFFFFF;
    border-color: #FFFFFF;
    color: #123D66;
  }
  .cta .btn.primary:hover {
    background: #EAF3FC;
    border-color: #EAF3FC;
  }
  .cta .btn:not(.primary) {
    color: #F7FBFF;
    border-color: rgba(247, 251, 255, 0.72);
    background: rgba(255, 255, 255, 0.07);
  }
  .cta .btn:not(.primary):hover {
    border-color: #FFFFFF;
    background: rgba(255, 255, 255, 0.13);
  }
  .metrics-band {
    background: var(--dark);
    color: var(--dark-ink);
    border-top: 1px solid rgba(244, 247, 250, 0.12);
    border-bottom: 1px solid rgba(244, 247, 250, 0.12);
  }
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
  .metric {
    min-width: 0;
    padding: clamp(26px, 4vw, 42px);
    border-right: 1px solid rgba(244, 247, 250, 0.12);
  }
  .metric:last-child { border-right: 0; }
  .metric strong {
    display: block;
    margin: 10px 0 4px;
    font-size: clamp(28px, 3.2vw, 42px);
    line-height: 1;
    font-weight: 650;
  }
  .metric span {
    display: block;
    color: var(--dark-muted);
    font-size: 13px;
  }
  .cards-4,
  .schemes-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(16px, 2.5vw, 28px);
  }
  .card {
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255, 252, 247, 0.72);
    padding: clamp(22px, 3vw, 30px);
    display: grid;
    gap: 16px;
  }
  .card h3 {
    margin: 0;
    font-size: 21px;
    line-height: 1.12;
    letter-spacing: -0.025em;
  }
  .card a {
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
  }
  .evidence-panel {
    overflow: hidden;
    border-radius: 10px;
    background: var(--dark);
    color: var(--dark-ink);
    box-shadow: var(--shadow);
  }
  .evidence-grid {
    display: grid;
    grid-template-columns: minmax(250px, 0.38fr) minmax(0, 1fr);
    gap: clamp(24px, 5vw, 54px);
    padding: clamp(28px, 4vw, 48px);
    align-items: center;
  }
  .check-list {
    display: grid;
    gap: 13px;
    margin: 24px 0;
    padding: 0;
    list-style: none;
    color: var(--dark-muted);
    font-size: 14px;
  }
  .check-list li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .screenshot-frame {
    min-width: 0;
    overflow: hidden;
    border: 1px solid rgba(244, 247, 250, 0.12);
    border-radius: 7px;
    background: #0E141B;
  }
  .screenshot-frame img {
    width: 100%;
    height: auto;
  }
  .process-grid {
    display: grid;
    grid-template-columns: minmax(240px, 0.6fr) minmax(0, 1.4fr);
    gap: clamp(28px, 5vw, 64px);
    align-items: center;
  }
  .process-copy {
    display: grid;
    gap: 16px;
  }
  .process-flow {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 14px;
    align-items: stretch;
  }
  .flow-step {
    min-width: 0;
    position: relative;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 18px 14px;
    background: rgba(255, 252, 247, 0.68);
    text-align: center;
  }
  .flow-step h3 {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 14px;
  }
  .flow-step p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 12px;
  }
  .schemes-grid {
    grid-template-columns: repeat(7, minmax(0, 1fr));
  }
  .scheme {
    min-width: 0;
    border: 1px solid rgba(244, 247, 250, 0.11);
    border-radius: 8px;
    padding: 18px 16px;
    background: rgba(255, 255, 255, 0.03);
  }
  .scheme strong {
    display: block;
    margin: 12px 0 3px;
    font-size: 15px;
  }
  .scheme span {
    color: var(--dark-muted);
    font-size: 12px;
  }
  .cta-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 28px;
    align-items: center;
  }
  .footer {
    background: var(--dark);
    color: var(--dark-ink);
    border-top: 1px solid rgba(244, 247, 250, 0.12);
    padding: 40px 0;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.2fr repeat(3, minmax(120px, 0.5fr)) 1fr;
    gap: clamp(22px, 4vw, 52px);
    align-items: start;
  }
  .footer h3 {
    margin: 0 0 12px;
    color: var(--accent-2);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .footer p,
  .footer a {
    color: var(--dark-muted);
    font-size: 13px;
  }
  .footer nav {
    display: grid;
    gap: 7px;
  }
  .signup {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .signup input {
    min-width: 0;
    width: 100%;
    height: 38px;
    border: 1px solid rgba(244, 247, 250, 0.16);
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.03);
    color: var(--dark-ink);
    padding: 0 12px;
  }
  .copy-panel {
    display: grid;
    gap: 12px;
    border: 1px solid rgba(255, 255, 255, 0.78);
    border-radius: 8px;
    padding: 18px;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 18px 48px rgba(9, 31, 52, 0.22);
  }
  .copy-row {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    color: var(--ink-soft);
    font-size: 12px;
  }
  .hash {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ink);
  }
  .icon-button {
    width: 34px;
    height: 34px;
    display: inline-grid;
    place-items: center;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
  }
  .copied {
    color: var(--success);
    font-weight: 700;
  }

  @media (max-width: 1080px) {
    .nav-inner { grid-template-columns: auto auto; }
    .nav-links { display: none; }
    .hero-grid,
    .process-grid,
    .evidence-grid,
    .cta-grid,
    .footer-grid {
      grid-template-columns: 1fr;
    }
    .cards-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .schemes-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .process-flow { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 720px) {
    :root { --gutter: 18px; }
    .site-nav { position: static; }
    .nav-inner {
      min-height: 58px;
      grid-template-columns: 1fr auto;
    }
    .nav-actions .btn:not(.primary) { display: none; }
    .wordmark-text { font-size: 18px; }
    .hero-grid { gap: 34px; }
    .hero h1 { font-size: clamp(42px, 14vw, 60px); }
    .product-body { grid-template-columns: 1fr; }
    .product-side { display: none; }
    .stat-grid,
    .metrics-grid,
    .cards-4,
    .schemes-grid,
    .process-flow {
      grid-template-columns: 1fr;
    }
    .metric {
      border-right: 0;
      border-bottom: 1px solid rgba(244, 247, 250, 0.12);
    }
    .metric:last-child { border-bottom: 0; }
    .trusted-list { gap: 10px 18px; }
    .hero-actions .btn,
    .button-row .btn,
    .cta .btn {
      width: 100%;
    }
    .copy-row { grid-template-columns: 1fr auto; }
    .copy-row > span:first-child { grid-column: 1 / -1; }
    .signup { flex-direction: column; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/src/icons.jsx"></script>
<script type="text/babel" src="src/src/parts.jsx"></script>
<script type="text/babel" src="src/src/sections.jsx"></script>
<script type="text/babel" src="src/src/app.jsx"></script>
</body>
</html>
