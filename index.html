<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keystone — Post-Quantum Cryptography Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --surface-raised: #F0F1F3;
    --fg: #111827;
    --fg-muted: #4B5563;
    --fg-subtle: #6B7280;
    --border: #D1D5DB;
    --border-subtle: #E5E7EB;
    --accent: #D97706;
    --accent-hover: #B45309;
    --accent-bg: #FEF3E2;
    --secondary: #0D9488;
    --success: #059669;
    --warning: #D97706;
    --error: #DC2626;
    --info: #2563EB;
    --grid: rgba(17, 24, 39, 0.04);
  }
  html.dark {
    --bg: #0F1114;
    --surface: #1A1D23;
    --surface-raised: #22252B;
    --fg: #E5E7EB;
    --fg-muted: #9CA3AF;
    --fg-subtle: #6B7280;
    --border: #2D3139;
    --border-subtle: #23262D;
    --accent: #D97706;
    --accent-hover: #F59E0B;
    --accent-bg: rgba(217, 119, 6, 0.10);
    --grid: rgba(255, 255, 255, 0.035);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02";
    line-height: 1.5;
  }
  .mono { font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, monospace; }
  ::selection { background: var(--accent); color: #fff; }
  a { color: inherit; }
  button { font-family: inherit; }
  img { display: block; max-width: 100%; }

  /* gridded background pattern - subtle */
  .grid-bg {
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  /* focus rings */
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/src/sections.jsx"></script>

</body>
